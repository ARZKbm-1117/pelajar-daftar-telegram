<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Pendaftaran Kelas Telegram</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #1a252f;
            margin: 0 0 8px 0;
            font-size: 22px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
            background-color: #fbfbfb;
        }
        input:focus, select:focus {
            border-color: #0088cc;
            outline: none;
            background-color: #fff;
        }
        .btn-submit {
            background-color: #0088cc;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #006699;
        }
        .btn-submit:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Borang Pendaftaran</h2>
    <p class="subtitle">Sila isi maklumat untuk merekod pendaftaran dan mendapatkan pautan kelas Telegram.</p>
    
    <!-- GANTIKAN URL_WEB_APP_ANDA DI SINI -->
    <form id="borangPendaftaran">
        
        <div class="input-group">
            <label for="nama">Nama Penuh Pelajar:</label>
            <input type="text" id="nama" name="Nama" placeholder="Contoh: Ahmad Bin Ali" required>
        </div>
        
        <div class="input-group">
            <label for="notel">No. Telefon (WhatsApp/Telegram):</label>
            <input type="tel" id="notel" name="NoTel" placeholder="Contoh: 0123456789" required>
        </div>
        
        <div class="input-group">
            <label for="kelas">Pilih Kelas Anda:</label>
            <select id="kelas" name="Kelas" required>
                <option value="" disabled selected>-- Sila Pilih Kelas --</option>
                <option value="H24">Kelas H24</option>
                <option value="H25">Kelas H25</option>
                <option value="H26">Kelas H26</option>
                <option value="H27">Kelas H27</option>
                <option value="H28">Kelas H28</option>
            </select>
        </div>
        
        <button type="submit" id="submitBtn" class="btn-submit">Daftar & Join Telegram</button>
    </form>
</div>

<script>
    const form = document.getElementById('borangPendaftaran');
    const submitBtn = document.getElementById('submitBtn');
    
    // Sila letakkan URL Google Apps Script Web App anda di bawah ini:
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwB2XGZm8ASyy6MlbNv7KCt6DXpGr0Zvemu4mfzWwLMCd9Phssf2wP-vyMqzx8frUw0/exec"; 
    
    // Pautan Telegram kelas anda
    const linkTelegram = "https://t.me/+SwXgUMtp0F9hYWE1";

    form.addEventListener('submit', function(e) {
        e.preventDefault(); // Sekat borang daripada refresh skrin sesuka hati
        
        // Tukar tulisan butang tanda sistem sedang bekerja
        submitBtn.disabled = true;
        submitBtn.innerText = "Sila tunggu, sedang mendaftar...";
        
        // Sediakan data untuk dihantar
        const formData = new FormData(form);
        
        // Hantar data ke Google Sheet secara senyap di latar belakang (AJAX/Fetch)
        fetch(webAppUrl, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            // Sebaik sahaja Google Sheet selesai terima data, bawa pelajar terus ke Telegram
            alert("Pendaftaran Berjaya Disimpan! Klik OK untuk masuk ke Telegram Kelas.");
            window.location.href = https://t.me/+SwXgUMtp0F9hYWE1;
        })
        .catch(error => {
            // Jika internet terputus atau Google Sheet error, tetap beri mereka masuk Telegram
            console.error('Error:', error);
            alert("Sistem sibuk, tetapi anda boleh terus masuk ke Telegram Kelas.");
            window.location.href = https://t.me/+SwXgUMtp0F9hYWE1;
        });
    });
</script>

</body>
</html>
