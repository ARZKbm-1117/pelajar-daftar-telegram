<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Pendaftaran Kelas Telegram</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #0088cc;
            outline: none;
        }
        .btn-submit {
            background-color: #0088cc; /* Warna Telegram */
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-submit:hover {
            background-color: #006699;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Borang Pendaftaran</h2>
    <p class="subtitle">Sila isi maklumat untuk mendapatkan pautan kelas Telegram.</p>
    
    <!-- Gantikan 'URL_GOOGLE_SCRIPT_ANDA' jika mahu sambung ke Google Sheets -->
    <form id="borangPendaftaran" action="https://script.google.com/macros/s/AKfycbz-IfT_MEkA-h3eCNfkVSJeckqe8LVFUEI3kb3DcOOqVBzIEKN_hKBMLr2rvm7RmplY/exec" method="POST">
        
        <div class="input-group">
            <label for="nama">Nama Penuh Pelajar:</label>
            <input type="text" id="nama" name="Nama" placeholder="Contoh: Ahmad Bin Ali" required>
        </div>
        
        <div class="input-group">
            <label for="notel">No. Telefon (WhatsApp/Telegram):</label>
            <input type="tel" id="notel" name="NoTel" placeholder="Contoh: 0123456789" required>
        </div>
        
        <div class="input-group">
            <label for="kelas">Pilih Kelas Anda:</label>
            <select id="kelas" name="Kelas" required>
                <option value="" disabled selected>-- Sila Pilih Kelas --</option>
                <option value="H24">Kelas H24</option>
                <option value="H25">Kelas H25</option>
                <option value="H26">Kelas H26</option>
                <option value="H27">Kelas H27</option>
                <option value="H28">Kelas H28</option>
            </select>
        </div>
        
        <button type="submit" class="btn-submit">Daftar & Join Telegram</button>
    </form>
</div>

<script>
    document.getElementById('borangPendaftaran').addEventListener('submit', function(e) {
        // 1. Sekat form daripada submit cara biasa (jika mahu buat hantaran data ke Google Sheet dulu)
        // e.preventDefault(); 

        // 2. Link Telegram yang diberikan
        const linkTelegram = "https://t.me/+SwXgUMtp0F9hYWE1";

        // 3. Makluman kepada pelajar
        alert("Pendaftaran anda telah direkodkan! Klik OK untuk masuk ke Telegram Kelas.");

        // 4. Buka aplikasi/link Telegram
        window.location.href = https://t.me/+SwXgUMtp0F9hYWE1; 
    });
</script>

</body>
</html>
